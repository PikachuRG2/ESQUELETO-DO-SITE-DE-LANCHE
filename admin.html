
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Painel de Pedidos</h1>

<div id="login">
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="toggleRegister()">Registrar</button>
<div id="register" class="hidden" style="margin-top:10px">
  <input id="userReg" placeholder="Novo usuário">
  <input id="passReg" type="password" placeholder="Nova senha">
  <button onclick="register()">Salvar Registro</button>
</div>
</div>

<div id="painel" style="display:none">

<h2>Pedidos em tempo real</h2>
<div class="toolbar">
<label>Status: 
<label>Status: 
<select id="statusFilter">
  <option value="todos">Todos</option>
  <option value="Recebido">Recebido</option>
  <option value="Preparando">Preparando</option>
  <option value="Pronto">Pronto</option>
  <option value="Entregue">Entregue</option>
</select>
</label>
<label>Ordenar:
<select id="sortBy">
  <option value="recente">Mais recentes</option>
  <option value="antigo">Mais antigos</option>
  <option value="status">Status</option>
</select>
</label>
<label>Auto atualizar:
<input type="checkbox" id="autoRefresh" checked>
</label>
<label>Intervalo:
<select id="refreshMs">
  <option value="2000">2s</option>
  <option value="5000">5s</option>
  <option value="10000">10s</option>
</select>
</label>
<button id="refreshNow">Atualizar agora</button>
<input id="search" placeholder="Buscar por nome ou CPF" style="flex:1;min-width:220px">
<div id="kpis" class="kpis"></div>
<div class="table">
<div class="row header-row">
  <div>Cliente</div><div>Total</div><div>Status</div><div>ETA</div><div>Pagamento</div><div class="actions">Ações</div>
</div>
<div id="pedidos"></div>
</div>

<h2>Relatório diário</h2>
<p>Data: <span id="reportDate"></span></p>
<p>Total de pedidos: <span id="reportCount">0</span></p>
<p>Vendas: R$ <span id="reportTotal">0</span></p>
<button onclick="imprimirDia()">Imprimir relatório</button>

<div id="printArea" class="hidden"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
